<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Choice Drop — Randomizer Arena</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link href="styles.css" rel="stylesheet" />
</head>

<body class="bg-background text-on-background h-[100dvh] flex flex-col overflow-hidden relative">

    <!-- Top Navigation -->
    <header
        class="bg-[#ffffff] border-b-[2.5px] border-[#2f2d29] fixed top-0 w-full z-50">
        <div class="flex justify-between items-center px-6 py-4 w-full">
            <div
                class="text-2xl font-bold font-headline text-pastel-pink border-[2.5px] border-[#2f2d29] bg-[#ffffff] px-4 py-1.5 rounded-xl shadow-[3px_3px_0px_#2f2d29] transition-kawaii hover:translate-x-[-1px] hover:translate-y-[-1px] hover:shadow-[4px_4px_0px_#2f2d29] flex items-center gap-2 cursor-default select-none">
                <span class="inline-block kawaii-bounce text-xl">🎈</span>
                <span class="text-[#2f2d29] font-black uppercase tracking-tight">Choice Drop</span>
            </div>
            <div class="flex items-center gap-4">
                <button id="btn-back-winner"
                    class="hidden px-4 py-2 bg-pastel-blue text-[#2f2d29] rounded-xl border-2 border-[#2f2d29] shadow-[3px_3px_0px_#2f2d29] transition-kawaii hover:translate-x-[-1px] hover:translate-y-[-1px] hover:shadow-[4px_4px_0px_#2f2d29] active:translate-x-[2px] active:translate-y-[2px] active:shadow-[1px_1px_0px_#2f2d29] flex items-center gap-2 group">
                    <span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform">arrow_back</span>
                    <span class="font-headline text-xs font-bold tracking-wider uppercase">Back to Results</span>
                </button>
                <button id="btn-toggle-live-stats"
                    class="hidden px-4 py-2 bg-[#ffffff] text-[#2f2d29] rounded-xl border-2 border-[#2f2d29] shadow-[3px_3px_0px_#2f2d29] transition-kawaii hover:translate-x-[-1px] hover:translate-y-[-1px] hover:shadow-[4px_4px_0px_#2f2d29] active:translate-x-[2px] active:translate-y-[2px] active:shadow-[1px_1px_0px_#2f2d29] flex items-center gap-2 group">
                    <span class="material-symbols-outlined text-lg group-hover:scale-110 transition-transform">leaderboard</span>
                    <span class="font-headline text-xs font-bold tracking-wider uppercase">Live Stats</span>
                </button>
            </div>
        </div>
    </header>

    <!-- VIEW: SETUP -->
    <main id="view-setup"
        class="view active flex-grow flex-col items-center justify-start px-6 pt-24 pb-32 max-w-4xl mx-auto w-full relative z-10 overflow-y-auto overflow-x-hidden min-h-0">

        <div class="relative mb-10 text-center kawaii-float">
            <h1
                class="headline-font text-5xl md:text-6xl font-black text-[#2f2d29] tracking-tight uppercase leading-none">
                Enter Your <br /><span class="bg-pastel-yellow border-[2.5px] border-[#2f2d29] px-3 py-1 rounded-2xl shadow-[4px_4px_0px_#2f2d29] inline-block mt-2">Choices</span>
            </h1>
        </div>

        <div class="w-full grid grid-cols-1 md:grid-cols-12 gap-4">
            <div
                class="md:col-span-4 bg-pastel-mint border-2.5 border-[#2f2d29] rounded-2xl p-6 flex flex-col justify-between shadow-flat">
                <div>
                    <h3 class="headline-font text-xl font-bold text-[#2f2d29] mb-2 uppercase tracking-wide">The Arena</h3>
                    <p class="text-on-surface-variant text-sm leading-relaxed font-medium">
                        Input the contenders for tonight's race. Tap start and let gravity choose!
                    </p>
                </div>
            </div>

            <div class="md:col-span-8 space-y-4" id="choices-list">
                <!-- Choice inputs rendered by JS -->
            </div>
        </div>

        <div class="mt-8 md:ml-auto md:w-2/3">
            <button id="add-choice-btn"
                class="w-full group flex items-center justify-center gap-3 py-4 border-[2.5px] border-dashed border-[#2f2d29] rounded-2xl text-[#2f2d29] hover:bg-pastel-blue/30 transition-kawaii bg-[#ffffff] shadow-[3px_3px_0px_#2f2d29] hover:shadow-[4px_4px_0px_#2f2d29] hover:translate-x-[-1px] hover:translate-y-[-1px] active:translate-x-[2px] active:translate-y-[2px] active:shadow-[1px_1px_0px_#2f2d29]">
                <span class="material-symbols-outlined transition-transform group-hover:rotate-90"
                    data-icon="add">add</span>
                <span class="font-bold uppercase tracking-widest text-xs">Add Another Choice</span>
            </button>
        </div>

        <div class="mt-12 w-full max-w-md mx-auto">
            <button id="start-race-btn"
                class="w-full group relative bg-pastel-pink border-2.5 border-[#2f2d29] py-5 rounded-2xl shadow-flat hover:shadow-[6px_6px_0px_#2f2d29] hover:translate-x-[-2px] hover:translate-y-[-2px] active:translate-x-[2px] active:translate-y-[2px] active:shadow-[1px_1px_0px_#2f2d29] transition-kawaii">
                <div class="flex items-center justify-center gap-4 relative z-10">
                    <span
                        class="headline-font text-xl font-black tracking-tight text-[#2f2d29] uppercase">Start the race</span>
                    <span class="material-symbols-outlined text-[#2f2d29]" data-weight="fill"
                        style="font-variation-settings: 'FILL' 1;">bolt</span>
                </div>
            </button>
            <p id="setup-error"
                class="text-center text-xs font-bold text-[#2f2d29] bg-error border-2 border-[#2f2d29] rounded-xl py-2 px-4 max-w-xs mx-auto uppercase tracking-wider mt-4 opacity-0 transition-opacity shadow-[2px_2px_0px_#2f2d29]">
                Need at least 2 choices</p>
        </div>
    </main>

    <main id="view-race"
        class="view flex-grow flex-col items-center justify-center pt-24 pb-4 px-4 md:px-8 w-full z-10 overflow-hidden relative">
        <div
            class="relative w-full h-full max-w-5xl bg-[#ffffff] rounded-3xl overflow-hidden border-2.5 border-[#2f2d29] shadow-flat flex justify-center">

            <div id="live-stats-overlay" class="absolute top-6 right-6 w-64 max-h-[60vh] bg-[#ffffff]/95 border-2.5 border-[#2f2d29] rounded-2xl shadow-flat z-30 flex flex-col hidden transition-opacity duration-300">
                <div class="flex justify-between items-center p-4 border-b-2 border-[#2f2d29] shrink-0">
                    <h3 class="headline-font text-sm font-black text-[#2f2d29] uppercase tracking-widest">Live Race</h3>
                    <button id="btn-close-live-stats" class="text-on-surface-variant hover:text-error transition-colors flex items-center justify-center">
                        <span class="material-symbols-outlined text-sm">close</span>
                    </button>
                </div>
                <div id="live-stats-list" class="p-3 space-y-3 overflow-y-auto hidden-scrollbar flex-grow">
                    <!-- live stats injected here -->
                </div>
            </div>

            <!-- Target Canvas -->
            <canvas id="race-canvas" class="w-full h-full block bg-gradient-to-b from-[#2a2824] to-[#161513]"></canvas>

        </div>
    </main>

    <!-- VIEW: WINNER -->
    <main id="view-winner"
        class="view flex-grow flex-col items-center justify-center p-4 pt-20 pb-4 z-20 overflow-y-auto min-h-0">

        <div class="relative z-10 w-full max-w-4xl mx-auto flex flex-col items-center">

            <div class="relative mb-6 text-center kawaii-float">
                <h1
                    class="headline-font text-5xl md:text-7xl font-black text-pastel-pink tracking-tight uppercase leading-none italic drop-shadow-[4px_4px_0px_#2f2d29] [-webkit-text-stroke:2.5px_#2f2d29]">
                    WE HAVE A<br />WINNER!
                </h1>
            </div>

            <div class="group relative w-full max-w-md cursor-default">
                <div
                    class="relative bg-pastel-yellow rounded-2xl border-2.5 border-[#2f2d29] p-6 shadow-flat flex flex-col items-center gap-2 overflow-hidden">
                    <span class="font-body text-[#2f2d29] text-xs md:text-sm font-extrabold tracking-wider uppercase">The Choice is clear 🌟</span>
                    <h2 id="winner-name"
                        class="headline-font text-5xl md:text-6xl font-black mb-2 text-[#2f2d29] text-center leading-tight drop-shadow-[2px_2px_0px_#ffffff] [-webkit-text-stroke:1.5px_#2f2d29] break-all">
                        Winner
                    </h2>
                </div>
            </div>

            <div class="mt-8 flex flex-wrap justify-center gap-3 max-w-2xl px-4 w-full">
                <button id="btn-race-again"
                    class="w-full group relative px-8 py-4 bg-pastel-pink border-2.5 border-[#2f2d29] rounded-2xl headline-font text-[#2f2d29] font-black text-lg uppercase tracking-tight shadow-flat hover:shadow-[6px_6px_0px_#2f2d29] hover:translate-x-[-2px] hover:translate-y-[-2px] active:translate-x-[2px] active:translate-y-[2px] active:shadow-[1px_1px_0px_#2f2d29] transition-kawaii">
                    Race Again
                </button>
                <div class="w-full flex gap-3 flex-wrap">
                    <button id="btn-show-stats"
                        class="flex-1 min-w-[140px] px-4 py-3.5 bg-pastel-mint border-2.5 border-[#2f2d29] text-[#2f2d29] rounded-2xl headline-font font-black text-xs uppercase tracking-wider shadow-flat hover:shadow-[5px_5px_0px_#2f2d29] hover:translate-x-[-1px] hover:translate-y-[-1px] active:translate-x-[2px] active:translate-y-[2px] active:shadow-[1px_1px_0px_#2f2d29] transition-kawaii">
                        Results Table
                    </button>
                    <button id="btn-view-state"
                        class="flex-1 min-w-[140px] px-4 py-3.5 bg-pastel-blue border-2.5 border-[#2f2d29] text-[#2f2d29] rounded-2xl headline-font font-black text-xs uppercase tracking-wider shadow-flat hover:shadow-[5px_5px_0px_#2f2d29] hover:translate-x-[-1px] hover:translate-y-[-1px] active:translate-x-[2px] active:translate-y-[2px] active:shadow-[1px_1px_0px_#2f2d29] transition-kawaii">
                        View Arena
                    </button>
                </div>
                <button id="btn-back-setup"
                    class="w-full mt-2 px-4 py-3.5 bg-[#ffffff] border-2.5 border-[#2f2d29] text-[#2f2d29] rounded-2xl headline-font font-black text-xs uppercase tracking-widest shadow-flat hover:shadow-[5px_5px_0px_#2f2d29] hover:translate-x-[-1px] hover:translate-y-[-1px] active:translate-x-[2px] active:translate-y-[2px] active:shadow-[1px_1px_0px_#2f2d29] transition-kawaii">
                    Back to Setup
                </button>
            </div>
        </div>
    </main>

    <!-- STATS MODAL -->
    <dialog id="stats-modal"
        class="bg-transparent backdrop:bg-[#2f2d29]/40 backdrop:backdrop-blur-sm m-auto w-[95%] max-w-xl p-0 overflow-visible outline-none rounded-3xl transform transition-all">
        <div
            class="bg-[#ffffff] rounded-3xl p-6 md:p-8 border-2.5 border-[#2f2d29] shadow-flat relative w-full h-auto max-h-[85vh] flex flex-col">
            <button id="btn-close-stats"
                class="absolute top-6 right-6 text-[#2f2d29] hover:text-[#ff8383] active:scale-90 transition-all z-10 w-8 h-8 flex items-center justify-center bg-[#ffffff] border-2 border-[#2f2d29] rounded-full shadow-[2px_2px_0px_#2f2d29] hover:shadow-[3px_3px_0px_#2f2d29] hover:translate-x-[-1px] hover:translate-y-[-1px] active:translate-x-[1px] active:translate-y-[1px] active:shadow-[0px_0px_0px_#2f2d29]">
                <span class="material-symbols-outlined text-lg">close</span>
            </button>
            <h2 class="headline-font text-3xl font-black text-[#2f2d29] uppercase mb-6 drop-shadow-md shrink-0">Race Results</h2>
            <div id="final-stats-list"
                class="space-y-4 overflow-y-auto overflow-x-hidden hidden-scrollbar pr-2 pb-4 flex-grow relative">
                <!-- Stats injected here -->
            </div>
        </div>
    </dialog>

    <script src="app.js"></script>
</body>

</html>
